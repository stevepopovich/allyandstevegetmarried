<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      href="/hd-pixel-art-orange-heart-icon-png-701751694961098akxvei0ipz.png"
      type="image/png"
    />
    <title>Ally & Steve — Save the Date</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-fullpage family-page">
    <div class="home-scroll">
      <section
        class="home-panel home-panel--save-date family-panel--save-date"
        aria-label="Save the date"
      >
        <img
          src="/save-date-2.png"
          alt="Save the dates — Ally and Steven"
          width="888"
          height="1270"
          decoding="async"
          fetchpriority="high"
        />
      </section>
      <section
        class="home-panel home-panel--details family-panel--details"
        aria-label="Event details"
      >
        <div class="home-details-duo">
          <img
            src="/details-3.png"
            alt="The ceremony — Thursday, September 10, 2026, half past 3 o'clock in the afternoon, The Lancaster, Chicago, Illinois"
            decoding="async"
          />
          <img
            src="/details-2.png"
            alt="The celebration — Saturday, September 12, 2026, 7 o'clock in the evening, The Athletic Club, Columbus, Ohio"
            decoding="async"
          />
        </div>
      </section>
    </div>
  </body>
</html>
