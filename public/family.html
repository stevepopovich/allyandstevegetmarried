<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      href="/hd-pixel-art-orange-heart-icon-png-701751694961098akxvei0ipz.png"
      type="image/png"
    />
    <title>Ally & Steve — Save the Date</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,600;1,800&family=Montserrat:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-fullpage family-page">
    <div class="home-scroll">
      <section
        class="home-panel home-panel--save-date family-panel--save-date"
        aria-label="Save the date"
      >
        <div class="save-date-card">
          <p class="save-date-eyebrow">To Wed</p>
          <div class="save-date-stack">
            <span class="word">Save</span>
            <span class="the">the</span>
            <span class="word">Dates</span>
          </div>
          <p class="save-date-signature">Ally &amp; Steven</p>
        </div>
      </section>
      <section
        class="home-panel home-panel--details family-panel--details"
        aria-label="Event details"
      >
        <div class="event-duo">
          <article class="event-card">
            <h2 class="event-heading">The Ceremony</h2>
            <p class="event-lines">
              Thursday, September 10, 2026<br />
              Half past 3 o'clock in the afternoon<br />
              The Lancaster<br />
              Chicago, Illinois
            </p>
          </article>
          <article class="event-card">
            <h2 class="event-heading">The Celebration</h2>
            <p class="event-lines">
              Saturday, September 12, 2026<br />
              7 o'clock in the evening<br />
              The Athletic Club<br />
              136 E Broad Street,<br />
              Columbus, Ohio
            </p>
          </article>
        </div>
      </section>
    </div>
  </body>
</html>
